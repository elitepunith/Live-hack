<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live-Hack — Global Cyber Threat Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <div class="header-left">
      <!-- hamburger only shows on mobile -->
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" stroke="#3b82f6" stroke-width="1.2" fill="rgba(59,130,246,0.1)"/>
            <circle cx="8" cy="8" r="2" fill="#3b82f6"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">Live-Hack</span>
          <span class="logo-sub">Cyber Threat Intelligence</span>
        </div>
      </div>
      <div class="live-chip">
        <span class="chip-dot"></span>
        <span>Live</span>
      </div>
    </div>

    <!-- center nav — hidden on mobile -->
    <nav class="header-center">
      <span class="nav-item active">Threat Map</span>
    </nav>

    <div class="header-right">
      <!-- stats — hide on small screens -->
      <div class="header-stat hide-mobile">
        <span class="hs-label">Total Attacks</span>
        <span class="hs-value" id="total-count">—</span>
      </div>
      <div class="header-divider hide-mobile"></div>
      <div class="header-stat hide-mobile">
        <span class="hs-label">Per Minute</span>
        <span class="hs-value accent" id="apm-count">—</span>
      </div>
      <div class="header-divider hide-mobile"></div>
      <div class="clock-wrap hide-mobile">
        <span class="clock-label">UTC</span>
        <span class="clock-val mono" id="utc-clock">00:00:00</span>
      </div>
      <div class="header-divider hide-mobile"></div>

      <!-- playback controls -->
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btn-pause" title="Pause simulation" onclick="togglePause()">⏸</button>

        <!-- speed: ×½ / ×1 / ×2 -->
        <div class="speed-wrap" title="Simulation speed">
          <button class="speed-btn" data-speed="0" onclick="setSpeed(0)">×½</button>
          <button class="speed-btn active" data-speed="1" onclick="setSpeed(1)">×1</button>
          <button class="speed-btn" data-speed="2" onclick="setSpeed(2)">×2</button>
        </div>

        <button class="ctrl-btn" id="btn-sound" title="Toggle sound" onclick="toggleSound()">🔇</button>
      </div>

      <div class="header-divider"></div>

      <!-- theme switcher -->
      <div class="theme-picker" title="Switch theme">
        <button class="theme-btn active" data-theme="dark"  onclick="setTheme('dark')"  title="Dark">◐</button>
        <button class="theme-btn"        data-theme="light" onclick="setTheme('light')" title="Light">◑</button>
        <button class="theme-btn"        data-theme="neon"  onclick="setTheme('neon')"  title="Matrix">⌬</button>
      </div>
    </div>
  </header>

  <!-- LAYOUT -->
  <div id="layout">

    <!-- left sidebar -->
    <aside id="sidebar">
      <div class="sidebar-scroll">
        <div class="sidebar-section">
          <div class="section-title">
            <span class="section-dot" style="background:#ef4444"></span>
            Top Attackers
          </div>
          <div id="top-sources" class="rank-list"></div>
        </div>

        <div class="sidebar-sep"></div>

        <div class="sidebar-section">
          <div class="section-title">
            <span class="section-dot" style="background:#3b82f6"></span>
            Top Targets
          </div>
          <div id="top-targets" class="rank-list"></div>
        </div>

        <div class="sidebar-sep"></div>

        <div class="sidebar-section">
          <div class="section-title">
            <span class="section-dot" style="background:#8b5cf6"></span>
            Attack Vectors
          </div>
          <div id="type-list" class="type-list"></div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="footer-row">
          <span class="footer-label">Sensor Nodes</span>
          <span class="footer-val green">247 Online</span>
        </div>
        <div class="footer-row">
          <span class="footer-label">Data Source</span>
          <span class="footer-val blue" id="data-source">Simulated</span>
        </div>
        <div class="footer-row">
          <span class="footer-label">Latency</span>
          <span class="footer-val muted">~2.1s</span>
        </div>
      </div>
    </aside>

    <!-- map area -->
    <div id="map-wrap">
      <div id="map"></div>

      <!-- SVG arcs overlay — above map tiles, below UI -->
      <svg id="arc-svg" xmlns="http://www.w3.org/2000/svg"></svg>

      <!-- filter chips -->
      <div id="filter-bar">
        <span class="filter-label mono">Filter</span>
        <div id="filter-chips"></div>
      </div>

      <!-- attack detail card -->
      <div id="attack-card" class="hidden">
        <div class="ac-header">
          <span class="ac-type-dot" id="ac-dot"></span>
          <span class="ac-type" id="ac-type"></span>
          <span class="ac-sev" id="ac-sev"></span>
          <button class="ac-close" onclick="closeCard()">✕</button>
        </div>
        <div class="ac-route">
          <div class="ac-side">
            <div class="ac-flag" id="ac-src-flag"></div>
            <div class="ac-country" id="ac-src-country"></div>
            <div class="ac-ip mono" id="ac-src-ip"></div>
          </div>
          <div class="ac-arrow-wrap">
            <svg width="40" height="14" viewBox="0 0 40 14" fill="none">
              <path d="M2 7 Q20 2 38 7" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
              <path d="M33 3.5 L38 7 L33 10.5" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
          <div class="ac-side right">
            <div class="ac-flag" id="ac-tgt-flag"></div>
            <div class="ac-country" id="ac-tgt-country"></div>
            <div class="ac-ip mono" id="ac-tgt-ip"></div>
          </div>
        </div>
        <div class="ac-meta mono" id="ac-meta"></div>
      </div>

      <!-- mobile: floating feed toggle button -->
      <button class="mobile-feed-btn" id="mobile-feed-btn" onclick="toggleFeedPanel()" title="Show live feed">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="2" width="12" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="5.5" width="9" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="9" width="11" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
        Feed
      </button>
    </div>

    <!-- right feed panel -->
    <aside id="feed-panel">
      <div class="feed-header">
        <div class="feed-title-row">
          <span class="chip-dot"></span>
          <span class="panel-title">Live Feed</span>
        </div>
        <!-- close button visible on mobile -->
        <button class="feed-close hide-desktop" onclick="closeMobilePanels()">✕</button>
        <span class="feed-count mono" id="feed-count">0</span>
      </div>
      <div id="feed-scroll"></div>
    </aside>

  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div id="type-stats"></div>
    <div class="bottom-legend">
      <span class="legend-label">Severity</span>
      <div class="legend-item"><span class="ldot" style="background:#ef4444"></span><span class="hide-mobile">Critical</span></div>
      <div class="legend-item"><span class="ldot" style="background:#f97316"></span><span class="hide-mobile">High</span></div>
      <div class="legend-item"><span class="ldot" style="background:#eab308"></span><span class="hide-mobile">Medium</span></div>
      <div class="legend-item"><span class="ldot" style="background:#22c55e"></span><span class="hide-mobile">Low</span></div>
    </div>
  </div>

  <!-- mobile backdrop — clicking it closes any open panel -->
  <div id="mobile-overlay" onclick="closeMobilePanels()"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
